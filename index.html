<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <title>Training Split</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0c0c0c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Training">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0c0c0c; overflow-x: hidden; }
    #root { min-height: 100%; }
    /* Hide number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    /* Prevent text selection flash on tap */
    button { -webkit-tap-highlight-color: transparent; user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (production, no JSX transpilation needed — app.js is pre-compiled) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Pre-compiled app (no Babel runtime needed) -->
  <script src="./app.js"></script>

  <!-- Mount -->
  <script>
    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(App)
    );
  </script>

  <!-- Service worker (enables offline use + Add to Home Screen prompt) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .catch(err => console.warn("SW registration failed:", err));
      });
    }
  </script>
</body>
</html>
